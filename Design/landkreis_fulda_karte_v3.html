<div id="status-bar" style="margin-top:8px;display:flex;align-items:center;gap:10px;font-family:sans-serif;font-size:13px;color:var(--color-text-secondary,#666)">
  <span id="status-text">Gemeinde anklicken zum Filtern</span>
  <button id="reset-btn" onclick="resetFilter()" style="display:none;padding:4px 12px;background:#c0152a;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500">× Zurücksetzen</button>
</div>

<script>
(function(){
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var img = new Image();
  img.onload = function(){
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    ctx.drawImage(img, 0, 0);
  };
  img.src = 'karte-landkreis.png';

  var aktiv = null;

  window.klick = function(name, el){
    if(aktiv){
      var prev = document.querySelector('.gem.aktiv');
      var prevL = document.querySelector('.lbl.aktiv');
      if(prev) prev.classList.remove('aktiv');
      if(prevL) prevL.classList.remove('aktiv');
    }
    el.classList.add('aktiv');
    var lid = 'l-' + el.id.replace('g-','');
    var lbl = document.getElementById(lid);
    if(lbl) lbl.classList.add('aktiv');
    aktiv = name;
    document.getElementById('status-text').textContent = '📍 ' + name;
    document.getElementById('reset-btn').style.display = 'inline-block';
    if(typeof filterSetzen === 'function') filterSetzen('ort', name);
  };

  window.resetFilter = function(){
    var prev = document.querySelector('.gem.aktiv');
    var prevL = document.querySelector('.lbl.aktiv');
    if(prev) prev.classList.remove('aktiv');
    if(prevL) prevL.classList.remove('aktiv');
    aktiv = null;
    document.getElementById('status-text').textContent = 'Gemeinde anklicken zum Filtern';
    document.getElementById('reset-btn').style.display = 'none';
    if(typeof filterSetzen === 'function') filterSetzen('ort', '');
  };
})();
</script>
