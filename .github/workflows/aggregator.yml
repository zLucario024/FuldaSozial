name: Fulda News Aggregator
on:
  schedule:
    - cron: '0 23 * * *'  # täglich um Mitternacht MEZ (23 UTC = 00 MEZ)
  workflow_dispatch:
jobs:
  aggregator:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
      VAPID_EMAIL: ${{ secrets.VAPID_EMAIL }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4
      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Pakete installieren
        run: pip install feedparser requests anthropic python-dotenv psycopg2-binary
      - name: Aggregator starten
        run: python fulda_news_aggregator.py
      - name: Sitemap und Archiv committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml archiv/
          git diff --staged --quiet || git commit -m "Auto: Sitemap und Archiv aktualisiert"
          git push